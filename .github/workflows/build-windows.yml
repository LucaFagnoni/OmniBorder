name: Build & Release OmniBorder

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag e Nome della Release (es. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Scarica il codice dal repository originale
      - name: Checkout external repository
        uses: actions/checkout@v4
        with:
          repository: 'ndend-dev/OmniBorder'
          ref: 'main'
          submodules: recursive

      # 2. Configura l'ambiente del compilatore Visual Studio (MSVC)
      - name: Setup MSVC Developer Environment
        uses: ilammy/msvc-dev-cmd@v1

      # 3. Installa wxWidgets tramite vcpkg
      - name: Install wxWidgets
        run: |
          vcpkg install wxwidgets:x64-windows

      # 4. Configura il progetto con CMake usando il toolchain di vcpkg
      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      # 5. Compila il progetto in modalità Release
      - name: Build Project
        run: |
          cmake --build build --config Release

      # 6. Pubblica la Release allegando l'eseguibile trovato
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: OmniBorder ${{ inputs.version }}
          files: build/**/OmniBorder.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
